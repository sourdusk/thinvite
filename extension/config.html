<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="config.css">
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="header">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 256 256" fill="none">
        <defs><linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7c5af0"/><stop offset="100%" stop-color="#3d6ef5"/></linearGradient></defs>
        <rect width="256" height="256" rx="48" fill="url(#bg)"/>
        <circle cx="81" cy="166" r="46" stroke="white" stroke-width="11" fill="none"/>
        <circle cx="191" cy="74" r="30" fill="white"/>
        <line x1="129" y1="125" x2="163" y2="100" stroke="white" stroke-width="11" stroke-linecap="round"/>
      </svg>
      <h2>Thinvite Settings</h2>
    </div>

    <label class="field-label" for="min-follow">Minimum follow age (days)</label>
    <input type="number" id="min-follow" min="0" value="30">

    <label class="field-label" for="cooldown">Cooldown between invites (days)</label>
    <input type="number" id="cooldown" min="1" value="30">

    <button id="save-btn">Save</button>
    <p id="status-msg"></p>

    <p class="hint">You can also configure these from your
      <a href="%%SITE_URL%%/streamer" target="_blank">Thinvite dashboard</a>.</p>
  </div>
  <script src="config.js"></script>
</body>
</html>
