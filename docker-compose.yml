services:
  python:
    build: .
    container_name: thinvite-web
    restart: always
    ports:
      - 127.0.0.1:8083:8083
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./web:/opt/thinvite
    networks:
      - thinvite

  mariadb:
    image: mariadb:lts
    container_name: thinvite-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=thinvite
      - MYSQL_USER=thinvite
      - MYSQL_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - thinvite

volumes:
  mariadb_data:

networks:
  thinvite:

